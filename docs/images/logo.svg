<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Lattice/woven pattern referencing waitiwina fishing dams -->
    <pattern id="lattice" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="3" x2="12" y2="3" stroke="#C9A030" stroke-width="1.2" stroke-opacity="0.5"/>
      <line x1="0" y1="9" x2="12" y2="9" stroke="#C9A030" stroke-width="1.2" stroke-opacity="0.5"/>
      <line x1="3" y1="0" x2="3" y2="12" stroke="#A83220" stroke-width="1.0" stroke-opacity="0.35"/>
      <line x1="9" y1="0" x2="9" y2="12" stroke="#A83220" stroke-width="1.0" stroke-opacity="0.35"/>
    </pattern>
    <!-- Clipping circle for the lattice band -->
    <clipPath id="ringClip">
      <path d="M100,10 A90,90 0 1,1 99.99,10 Z M100,30 A70,70 0 1,0 100.01,30 Z" fill-rule="evenodd"/>
    </clipPath>
    <!-- Clipping circle for inner area -->
    <clipPath id="innerClip">
      <circle cx="100" cy="100" r="68"/>
    </clipPath>
  </defs>

  <!-- Dark brown background circle -->
  <circle cx="100" cy="100" r="95" fill="#2C1810"/>

  <!-- Outer golden ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#C9A030" stroke-width="5"/>

  <!-- Lattice woven band between outer ring and inner area -->
  <g clip-path="url(#ringClip)">
    <circle cx="100" cy="100" r="92" fill="#2C1810"/>
    <rect x="0" y="0" width="200" height="200" fill="url(#lattice)"/>
    <!-- Secondary diagonal weave for crosshatch depth -->
    <g opacity="0.4">
      <line x1="10" y1="10" x2="190" y2="190" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="30" y1="10" x2="200" y2="180" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="30" x2="180" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="50" y1="10" x2="200" y2="160" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="50" x2="160" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="70" y1="10" x2="200" y2="140" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="70" x2="140" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="90" y1="10" x2="200" y2="120" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="90" x2="120" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="110" y1="10" x2="200" y2="100" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="110" x2="100" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="130" y1="10" x2="200" y2="80" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="130" x2="80" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="150" y1="10" x2="200" y2="60" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="150" x2="60" y2="200" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="170" y1="10" x2="200" y2="40" stroke="#C9A030" stroke-width="0.8"/>
      <line x1="10" y1="170" x2="40" y2="200" stroke="#C9A030" stroke-width="0.8"/>
    </g>
  </g>
  <!-- Inner ring border -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#C9A030" stroke-width="1.5"/>

  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="68" fill="#2C1810"/>

  <!-- River/water motif - sinuous river flowing through center -->
  <g clip-path="url(#innerClip)">
    <!-- River body -->
    <path d="M55,35 C70,55 60,70 80,85 C100,100 90,115 75,130 C60,145 70,155 65,170"
          fill="none" stroke="#3A6B8C" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
    <path d="M55,35 C70,55 60,70 80,85 C100,100 90,115 75,130 C60,145 70,155 65,170"
          fill="none" stroke="#4A8BAF" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
    <path d="M55,35 C70,55 60,70 80,85 C100,100 90,115 75,130 C60,145 70,155 65,170"
          fill="none" stroke="#6AABCF" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Yakwa house - triangular/conical sacred flute house at center -->
  <!-- Triangular form referencing both the Yakwa and the ear pendants -->
  <g transform="translate(100,100)">
    <!-- House shadow/base -->
    <ellipse cx="2" cy="22" rx="22" ry="5" fill="#1A0E08" opacity="0.4"/>
    <!-- Main triangular structure -->
    <path d="M0,-32 L-22,20 L22,20 Z" fill="#A83220" opacity="0.9"/>
    <!-- Thatch texture lines on house -->
    <line x1="-5" y1="-20" x2="-18" y2="18" stroke="#2C1810" stroke-width="1" opacity="0.5"/>
    <line x1="5" y1="-20" x2="18" y2="18" stroke="#2C1810" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-32" x2="0" y2="20" stroke="#2C1810" stroke-width="1" opacity="0.4"/>
    <!-- Horizontal bands on house -->
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="#C9A030" stroke-width="1.2" opacity="0.7"/>
    <line x1="-14" y1="2" x2="14" y2="2" stroke="#C9A030" stroke-width="1.2" opacity="0.7"/>
    <line x1="-19" y1="14" x2="19" y2="14" stroke="#C9A030" stroke-width="1.2" opacity="0.7"/>
    <!-- Door opening -->
    <rect x="-4" y="8" width="8" height="12" rx="1" fill="#1A0E08" opacity="0.7"/>
    <!-- Peak ornament -->
    <circle cx="0" cy="-32" r="3" fill="#C9A030"/>
  </g>

  <!-- Small triangular fish trap motifs around the inner circle -->
  <!-- Top -->
  <g transform="translate(100,42)">
    <path d="M0,-6 L-5,6 L5,6 Z" fill="#C9A030" opacity="0.7"/>
  </g>
  <!-- Bottom -->
  <g transform="translate(100,158)">
    <path d="M0,6 L-5,-6 L5,-6 Z" fill="#C9A030" opacity="0.7"/>
  </g>
  <!-- Left -->
  <g transform="translate(42,100)">
    <path d="M-6,0 L6,-5 L6,5 Z" fill="#C9A030" opacity="0.7"/>
  </g>
  <!-- Right -->
  <g transform="translate(158,100)">
    <path d="M6,0 L-6,-5 L-6,5 Z" fill="#C9A030" opacity="0.7"/>
  </g>
  <!-- Diagonal markers - small dots at cardinal-diagonal points -->
  <circle cx="59" cy="59" r="2.5" fill="#A83220" opacity="0.6"/>
  <circle cx="141" cy="59" r="2.5" fill="#A83220" opacity="0.6"/>
  <circle cx="59" cy="141" r="2.5" fill="#A83220" opacity="0.6"/>
  <circle cx="141" cy="141" r="2.5" fill="#A83220" opacity="0.6"/>

  <!-- Outer ring accent marks - like village houses around the circle -->
  <g opacity="0.6">
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(0,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(30,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(60,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(90,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(120,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(150,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(180,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(210,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(240,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(270,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(300,100,100)"/>
    <rect x="97" y="6" width="6" height="4" rx="1" fill="#C9A030" transform="rotate(330,100,100)"/>
  </g>
</svg>
