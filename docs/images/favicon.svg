<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="44"/></clipPath>
  </defs>

  <!-- Dark brown background -->
  <circle cx="50" cy="50" r="48" fill="#2C1810"/>

  <!-- Gold border ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#B8941A" stroke-width="7"/>

  <!-- Waitiwina lattice: bold diagonal X -->
  <g clip-path="url(#c)">
    <line x1="10" y1="10" x2="90" y2="90" stroke="#B8941A" stroke-width="5" opacity="0.7"/>
    <line x1="90" y1="10" x2="10" y2="90" stroke="#B8941A" stroke-width="5" opacity="0.7"/>
  </g>

  <!-- Yãkwa house — red triangle -->
  <path d="M50,24 L34,68 L66,68 Z" fill="#A83220"/>
</svg>
