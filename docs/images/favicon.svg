<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Simplified lattice for small size -->
    <pattern id="fl" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="2" x2="8" y2="2" stroke="#C9A030" stroke-width="1.5" stroke-opacity="0.45"/>
      <line x1="0" y1="6" x2="8" y2="6" stroke="#C9A030" stroke-width="1.5" stroke-opacity="0.45"/>
      <line x1="2" y1="0" x2="2" y2="8" stroke="#A83220" stroke-width="1.2" stroke-opacity="0.35"/>
      <line x1="6" y1="0" x2="6" y2="8" stroke="#A83220" stroke-width="1.2" stroke-opacity="0.35"/>
    </pattern>
    <clipPath id="rc">
      <path d="M32,2 A30,30 0 1,1 31.99,2 Z M32,10 A22,22 0 1,0 32.01,10 Z" fill-rule="evenodd"/>
    </clipPath>
    <clipPath id="ic">
      <circle cx="32" cy="32" r="21"/>
    </clipPath>
  </defs>

  <!-- Base circle -->
  <circle cx="32" cy="32" r="31" fill="#2C1810"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="#C9A030" stroke-width="2"/>

  <!-- Lattice ring -->
  <g clip-path="url(#rc)">
    <circle cx="32" cy="32" r="30" fill="#2C1810"/>
    <rect x="0" y="0" width="64" height="64" fill="url(#fl)"/>
  </g>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#C9A030" stroke-width="1"/>

  <!-- Inner dark -->
  <circle cx="32" cy="32" r="21" fill="#2C1810"/>

  <!-- River hint -->
  <g clip-path="url(#ic)">
    <path d="M20,14 C26,22 22,27 28,32 C34,37 30,42 26,48"
          fill="none" stroke="#4A8BAF" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
    <path d="M20,14 C26,22 22,27 28,32 C34,37 30,42 26,48"
          fill="none" stroke="#6AABCF" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Yakwa triangle -->
  <g transform="translate(32,32)">
    <path d="M0,-13 L-9,9 L9,9 Z" fill="#A83220" opacity="0.9"/>
    <line x1="-3" y1="-4" x2="3" y2="-4" stroke="#C9A030" stroke-width="1" opacity="0.7"/>
    <line x1="-6" y1="3" x2="6" y2="3" stroke="#C9A030" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="-13" r="1.5" fill="#C9A030"/>
  </g>

  <!-- Cardinal triangles -->
  <path d="M32,13 L30,17 L34,17 Z" fill="#C9A030" opacity="0.6"/>
  <path d="M32,51 L30,47 L34,47 Z" fill="#C9A030" opacity="0.6"/>
  <path d="M13,32 L17,30 L17,34 Z" fill="#C9A030" opacity="0.6"/>
  <path d="M51,32 L47,30 L47,34 Z" fill="#C9A030" opacity="0.6"/>
</svg>
