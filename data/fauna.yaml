  classification_indigenous: Maose nawe
  info: Maose holoti, maose xewena heheyese laka hehelone, edowa kadene hekenoko laka
    hewani. O tatu-peba é uma assombração (mau agouro). Quando cruza o caminho de
    alguém é uma ameaça (vai ficar doente); se ele cair ou deitar, a morte está sendo
    anunciada.
