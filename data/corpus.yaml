- id: okoyoliayawanereen
  title: Okoyoli Ayawanere En
  filename: okoyoliAyawanereEN.txt
  content: "Okoyoli e Ayawanere \n\nAyawanere etani Okoyoli, Ayawanere ameratahana\
    \ holi owiro heye takwa, enewalo Lolahanero,Lolakate  esokwate   ayawane, holi\
    \ Ayawanere heye awalo Lolahanero, holi nanita Ayawanere ehasakalone, Lolahanero\
    \ tasawati wakoyoa holi, Lolahanero aikialatene: Hala enawenero xala nato laka,\
    \ nexikere  wayakanetali hanolokwahena tako Awa akotekase hetalase tana, lolahanero\
    \ nato nane teta nane, Ayawanere aikwalatamane: Mahia xakaliwa,  Awerata heye,\
    \ awali xinakaha kakwa, holidema Lolahanero, hehe newa, awa waita hexota hetalase\
    \ heyotitira natoweta waita noweta hetase, awa akotekase hetalase tana newa eheye.\
    \ Hehe newa Ayawanere eheye, lolahanere heye, holi akoyona ekiakwa Ayawanere masemanere\
    \ hatalase yakoli eyota heu,heu,heu mahia totaliwala etalase, owahakasena netali,\
    \ holi Lolahanero otokowe eheye etine kaliyane  taololi newa etalase, holi Lolahanero\
    \ nowa eheye: haita kera nowe heheye, eheta masemanera kaxali hixo kali, Natoweta\
    \ waita nowetene noheti nowekera heheye, hetalase etine hexowa lalohi hesakwa\
    \ laka  hehenesekwaneta  hala hetalse hakolata enako, holidema lalahe sakwa lolate\
    \ towa  hatalase akolata enako, akolatene toheta hotaketikwa, mahia hakolako wala\
    \ exowata towane eyaokwa honako exowata towane, holidema eyaokwa honako taetã,\
    \ Ayawanere eraneto, exeneto kali enewaloha, Lololawa, Lololawalo, Waikwadawalo,\
    \ Enodawalo, Axodawalo, Oherolawa, yaliyalisenero. Holi kadene atahana Ayawanere\
    \ owana, holi owana hatalase alikiata akoyonane, hataha, akoyoa, hataha akoyoa\
    \ kali, menaneta akoyakotane anolotitera hatalase, holi enetane kañakakena. Heheta\
    \ heraneto kakwa  ekiata nowa heye, hala nowa heye, holidewa enetani Okoyoli awalolotene\
    \ wayone, hala newa enetane Okoyoli, kalitasenane newa, ekialata nane enowana\
    \ newa, aotahanane xexase kewalixa, atahana enowa, holi Ayawanere asewene hatalase\
    \ alikiatama yakoli enowana, holi noxe aokwa enaita, holi heno eyowe towane, holi\
    \ henoneta erekosetene, saka! Wata! Newa. Honalowatako ataolo eraokwa, holi ereyali\
    \ Ayawanere tekwa, onedayowa erowa dane, takwanaha towane, hetikwaneta atahanatama\
    \ yakoli enowana, aheranatama yakoli, wayoakataha honalowatako, araokota, koo!\
    \  Enetane erekone newaha, eyowane alatane dane, Ayawanere talase taolo alataha\
    \  kolowali ehe tana. Enereyali onedayoa Ayawanere erowa dane, holi deñoa owiro\
    \ nawe denatama, akowalanaha enowana holi owana tohetama, akoyonatama ekiakwaha,\
    \ kaweyakenatama enetane heye akwalinatamane, hala newa enetane, enanetatala laka\
    \ newa, awahanatamane dane, wayonatamane awalolonatamane, hala newa kalitakase\
    \ nane newe enetane detama ahotahanatamane akwalana enowana owiro ehe aokowetama\
    \ , holi owana yakoli Ayawanere hatalase alikiatawa, hoyakakota aokone erekotewane\
    \ , awetaho etaolo aokwa enaetaha, tohenatama yakoli aheranatamane yakoli, haita\
    \ enetane erekotamane, wayoakanha eholita hoxekota ataolo, holidema Lololawalo\
    \ tekotã ereñoa  Ayawanere deñoa, one kenekwadewatoa ehenokota toane Ayawanere\
    \ towane haweñawali toli nakota erowatowane, holi deñoa eneraneto naha towaneha,\
    \ haxineha emakayowa tekwanaha exeneto naha tikalita tekwaha ereñoa, holi deratiwa\
